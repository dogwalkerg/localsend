name: Codex Publish Windows Zip

"on":
  workflow_dispatch:
    inputs:
      run_id:
        description: "Actions run ID containing localsend-windows-x64-zip artifact"
        required: true
      tag:
        description: "Release tag"
        required: true
        default: "v1.17.0-windows-test"
      asset_name:
        description: "Release asset name"
        required: true
        default: "LocalSend-1.17.0-windows-x64.zip"

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          run-id: ${{ inputs.run_id }}
          name: localsend-windows-x64-zip
          path: artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename asset
        run: |
          ls -la artifact
          mv artifact/LocalSend-windows-x64.zip "${{ inputs.asset_name }}"
          sha256sum "${{ inputs.asset_name }}"

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: LocalSend Windows x64 Test Build
          overwrite_files: true
          body: |
            Windows x64 zip built by GitHub Actions.
            Source run: https://github.com/${{ github.repository }}/actions/runs/${{ inputs.run_id }}
          files: ${{ inputs.asset_name }}
          fail_on_unmatched_files: true
